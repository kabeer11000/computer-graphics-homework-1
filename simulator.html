<!DOCTYPE html>
<html>
<head>
<title>Flight Simulator</title>
<meta charset="utf-8">
<style>
body { margin: 0; overflow: hidden; background: #000; }
canvas { display: block; }
#info { position: absolute; top: 10px; left: 10px; color: #0f0; font: 14px monospace; background: rgba(0,0,0,0.7); padding: 10px; }
</style>
</head>
<body>
<div id="info">Loading...</div>
<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

var pitch = 0, yaw = 0, roll = 0;
var speed = 0;
var px = 0, py = 5, pz = 0;

var patchSize = 50;
var viewDist = 10;

var keys = {};
window.onkeydown = e => { keys[e.key] = true; e.preventDefault(); };
window.onkeyup = e => { keys[e.key] = false; };

var renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x6798c8);
document.body.appendChild(renderer.domElement);

var scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x6798c8, 100, 800);

var camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 5, 0);

var light = new THREE.DirectionalLight(0xffffff, 1.2);
light.position.set(0.4, 0.8, 0.3);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff, 0.3));

// Perlin noise
var P = [];
for (var i = 0; i < 256; i++) P[i] = Math.floor(Math.random() * 256);
for (var i = 0; i < 256; i++) P[256 + i] = P[i];

function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
function lerp(a, b, t) { return a + t * (b - a); }
function grad(h, x, y) {
    h &= 15;
    var u = h < 8 ? x : y;
    var v = h < 4 ? y : h === 12 || h === 14 ? x : 0;
    return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
}
function perlin(x, y) {
    var X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
    x -= Math.floor(x); y -= Math.floor(y);
    var u = fade(x), v = fade(y);
    var A = P[X] + Y, B = P[X + 1] + Y;
    return lerp(
        lerp(grad(P[A], x, y), grad(P[B], x - 1, y), u),
        lerp(grad(P[A + 1], x, y - 1), grad(P[B + 1], x - 1, y - 1), u), v);
}
function noise(x, y) {
    var v = 0, amp = 1, freq = 1, m = 0;
    for (var i = 0; i < 6; i++) { v += perlin(x * freq, y * freq) * amp; m += amp; amp *= 0.5; freq *= 2; }
    return v / m;
}
function height(wx, wz) { return noise(wx * 0.02, wz * 0.02) * 8 - 2; }
function col(y) {
    if (y < -2) return [0.1, 0.3, 0.8];
    if (y < 0) return [0.2, 0.6, 0.2];
    if (y < 3) return [0.3, 0.7, 0.3];
    if (y < 5) return [0.5, 0.4, 0.3];
    return [1, 1, 1];
}

var patches = {};
var patchMeshes = {};

function getPatch(ix, iz) {
    var k = ix + ',' + iz;
    if (patches[k]) return patches[k];

    var verts = [], cols = [];
    var res = 25;
    var x0 = ix * patchSize, x1 = (ix + 1) * patchSize;
    var z0 = iz * patchSize, z1 = (iz + 1) * patchSize;

    for (var z = 0; z <= res; z++) {
        for (var x = 0; x <= res; x++) {
            var wx = x0 + (x1 - x0) * x / res;
            var wz = z0 + (z1 - z0) * z / res;
            var wy = height(wx, wz);
            verts.push(wx, wy, wz);
            var c = col(wy);
            cols.push(c[0], c[1], c[2], 1);
        }
    }

    var idxs = [];
    for (var z = 0; z < res; z++) {
        for (var x = 0; x < res; x++) {
            var i = z * (res + 1) + x;
            idxs.push(i, i + 1, i + res + 1, i + 1, i + res + 2, i + res + 1);
        }
    }

    var geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    geo.setAttribute('color', new THREE.Float32BufferAttribute(cols, 4));
    geo.setIndex(idxs);
    geo.computeVertexNormals();

    var mat = new THREE.MeshLambertMaterial({ vertexColors: true, side: THREE.DoubleSide });
    var mesh = new THREE.Mesh(geo, mat);
    mesh.frustumCulled = false;
    scene.add(mesh);

    var patch = { mesh: mesh };
    patches[k] = patch;
    patchMeshes[k] = mesh;
    return patch;
}

var plane = null;
var loader = new GLTFLoader();
loader.load('cartoon_plane.glb', (gltf) => {
    plane = gltf.scene;
    plane.scale.set(0.5, 0.5, 0.5);
    scene.add(plane);
    document.getElementById('info').textContent = 'Pos: 0,0 | Click to start';
}, undefined, (err) => {
    console.error(err);
    document.getElementById('info').textContent = 'Model load error: ' + err;
});

window.onresize = () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
};

function update(dt) {
    var tp = 0, ty = 0, tr = 0;
    if (keys['w'] || keys['W']) tp = dt * 3;
    if (keys['s'] || keys['S']) tp = -dt * 3;
    if (keys['a'] || keys['A']) ty = dt * 3;
    if (keys['d'] || keys['D']) ty = -dt * 3;
    if (keys['q'] || keys['Q']) tr = dt * 3;
    if (keys['e'] || keys['E']) tr = -dt * 3;

    pitch += tp;
    yaw += ty;
    roll += tr;

    // Friction - reduce angular velocity over time (not displace to zero)
    pitch *= (1 - dt * 2);
    roll *= (1 - dt * 2);

    pitch = Math.max(-1.2, Math.min(1.2, pitch));
    yaw = Math.max(-1.5, Math.min(1.5, yaw));
    roll = Math.max(-1.2, Math.min(1.2, roll));
    if (keys['ArrowUp']) speed = Math.min(8, speed + dt * 4);
    if (keys['ArrowDown']) speed = Math.max(0, speed - dt * 4);

    // In local space: pitch up = nose rises = move up in world Y
    var cosP = Math.cos(pitch), sinP = -Math.sin(pitch);
    var cosY = Math.cos(yaw), sinY = Math.sin(yaw);

    // Forward direction in world space (no banking)
    var fwdX = sinY * cosP;
    var fwdY = sinP;
    var fwdZ = cosY * cosP;

    px += fwdX * speed * dt;
    py = Math.max(3, Math.min(15, py + fwdY * speed * dt));
    pz += fwdZ * speed * dt;
}

var camDist = 2;

function render() {
    var cx = Math.floor(px / patchSize);
    var cz = Math.floor(pz / patchSize);

    for (var iz = cz - viewDist; iz <= cz + viewDist; iz++) {
        for (var ix = cx - viewDist; ix <= cx + viewDist; ix++) {
            getPatch(ix, iz);
        }
    }

    // Camera fixed behind and above the plane, looking at plane
    var camX = px - Math.sin(yaw) * camDist;
    var camZ = pz - Math.cos(yaw) * camDist;
    var camY = py + 1;
    camera.position.set(camX, camY, camZ);
    camera.lookAt(px, py, pz);

    if (plane) {
        plane.position.set(px, py, pz);
        plane.rotation.set(pitch, yaw, roll, 'YXZ');
    }

    renderer.render(scene, camera);
    document.getElementById('info').textContent = 'Pos: ' + px.toFixed(0) + ',' + pz.toFixed(0) + ' | Patches: ' + Object.keys(patches).length;
}

var last = 0;
function loop(t) {
    var dt = Math.min(0.1, (t - last) / 1000);
    last = t;
    update(dt);
    render();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
